name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    paths:
      - "docker/**"
      - "src-tauri/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docker-image.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "docker/**"
      - "src-tauri/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docker-image.yml"

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file docker/Dockerfile --tag antigravity-tools:ci-${{ github.run_number }}
